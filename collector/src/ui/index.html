<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>heat-spike</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>heat-spike</h1>
    <div id="health" class="health-strip">loading health…</div>
  </header>

  <form id="knobs" class="knob-bar" autocomplete="off">
    <label>w_read <input name="w_read" type="number" step="0.1" value="1.0"></label>
    <label>w_write <input name="w_write" type="number" step="0.1" value="2.0"></label>
    <label>window <input name="window" type="number" value="30"></label>
    <label>min_span <input name="min_span" type="number" value="3"></label>
    <label>depth <input name="depth" type="number" value="1"></label>
    <label>limit <input name="limit" type="number" value="50"></label>
    <label>server <input name="server" type="text" placeholder="(all)"></label>
    <label>share <input name="share" type="text" placeholder="(all)"></label>
    <button type="submit">apply</button>
  </form>

  <nav id="crumbs" class="crumbs"></nav>
  <div id="status" class="status"></div>
  <div id="meta" class="meta"></div>
  <table id="table">
    <thead></thead>
    <tbody></tbody>
  </table>

  <script src="/app.js"></script>
</body>
</html>
